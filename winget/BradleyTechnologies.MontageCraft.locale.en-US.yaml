ShortDescription: Free Windows app that turns your photos into a slideshow set to music - a shareable MP4 or a live viewer.
Description: >-
  MontageCraft turns a folder of photos into a slideshow set to music. Pick photos by
  date, location, favorites, or quality; add your own music; choose transitions and
  Ken Burns motion; and either render an upload-ready MP4 (1080p or 4K) or run a private
  live "digital photo frame" viewer you can open from any device on your network. Photos
  are captioned automatically with their place and date. Free to use and share.
